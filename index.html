            function saveCheck() {
                const apptId = finAppointmentId || $('#finAppointmentId').value;
                if (!apptId) { showToast('❌ Виберіть запис!'); return; }
                const a = appointments.find(x => x.id === apptId);
                if (!a) { showToast('❌ Запис не знайдено!'); return; }

                const cn = $('#finClientName').value.trim() || a.clientName || '';
                const cb = $('#finCarBrand').value.trim() || a.carBrand || '';
                const cm = $('#finCarModel').value.trim() || a.carModel || '';
                const cy = $('#finCarYear').value.trim() || a.carYear || '';
                const pn = $('#finPlateNumber').value.trim() || '';
                const dv = $('#finDate').value || formatDate(new Date());
                const extra = parseFloat($('#finExtraCost').value) || 0;
                const discount = parseFloat($('#finDiscount').value) || 0;
                const prepayment = parseFloat($('#finPrepayment').value) || 0;
                const payStatus = $('#finPaymentStatus').value;

                const sumWorks = finWorks.reduce((s, fw) => s + (fw.price || 0) * (fw.quantity || 1), 0);
                const sumParts = finParts.reduce((s, fp) => s + (fp.salePrice || 0) * (fp.quantity || 1), 0);
                const subtotal = sumWorks + sumParts + extra;
                const discAmt = Math.round(subtotal * discount / 100 * 100) / 100;
                const total = Math.round((subtotal - discAmt) * 100) / 100;
                const sumPartsPurchase = finParts.reduce((s, fp) => s + (fp.purchasePrice || 0) * (fp.quantity || 1), 0);
                const profit = Math.round((sumWorks + sumParts - sumPartsPurchase - discAmt) * 100) / 100;
                const toPay = Math.round((total - prepayment) * 100) / 100;
                const paidAmount = payStatus === 'paid' ? total : (payStatus === 'partial' ? Math.min(prepayment, total) : 0);
                const debtRemaining = payStatus === 'paid' ? 0 : Math.max(0, total - prepayment);

                const checkData = {
                    id: finEditId || generateId(),
                    appointmentId: apptId,
                    clientName: cn,
                    carBrand: cb,
                    carModel: cm,
                    carYear: cy,
                    plateNumber: pn,
                    date: dv,
                    works: finWorks.map(fw => ({ name: fw.customName || fw.name, price: fw.price, quantity: fw.quantity || 1, total: (fw.price || 0) * (fw.quantity || 1) })),
                    parts: finParts.map(fp => ({ name: fp.name || 'Запчастина', purchasePrice: fp.purchasePrice || 0, salePrice: fp.salePrice || 0, quantity: fp.quantity || 1, total: (fp.salePrice || 0) * (fp.quantity || 1) })),
                    extraCost: extra,
                    discount,
                    discountAmount: discAmt,
                    subtotal,
                    totalSum: total,
                    profit,
                    prepayment,
                    paidAmount,
                    debtRemaining,
                    toPay,
                    paymentStatus: payStatus,
                    createdAt: finEditId ? (checks.find(c => c.id === finEditId)?.createdAt || new Date().toISOString()) : new Date().toISOString()
                };

                if (finEditId) {
                    const idx = checks.findIndex(c => c.id === finEditId);
                    if (idx >= 0) checks[idx] = checkData;
                    showToast('✅ Чек оновлено');
                } else {
                    checks.push(checkData);
                    showToast('✅ Чек створено');
                }

                const key = getClientProfileKey(cn);
                if (!clientsDB[key]) clientsDB[key] = { name: cn, phones: [], cars: [], visitCount: 0, totalSpent: 0 };
                clientsDB[key].totalSpent = (clientsDB[key].totalSpent || 0) + total;

                saveAll();
                updateClientNamesFromData();
                resetFinanceForm();
                renderFinanceTab();
            }

            function renderFinanceTab() {
                populateFinAppointmentsSelect();
                const todayStr = formatDate(new Date());
                const todayChecks = checks.filter(c => c.date === todayStr);
                $('#finTodayRevenue').textContent = todayChecks.reduce((s, c) => s + c.totalSum, 0).toFixed(0) + ' грн';
                $('#finTotalDebt').textContent = checks.reduce((s, c) => s + (c.debtRemaining || 0), 0).toFixed(0) + ' грн';
                const sorted = [...checks].sort((a, b) => (b.date || '').localeCompare(a.date || ''));

                `).join('') : '<div style="color:var(--text-muted);padding:12px;">Немає чеків</div>';

                $('#finPrepayment').value = c.prepayment || 0;

                finParts = (c.parts || []).map(p => ({ name: p.name, salePrice: p.salePrice, purchasePrice: p.purchasePrice || 0, quantity: p.quantity || 1 }));
                updateFinWorksList();

            // ========== ДРУК / КОПІЮВАННЯ / PDF ==========
            function getCheckReceiptHTML(c) {
                const lines = [];

                lines.push(`<p style="margin:2px 0;font-size:12px;">№ ${c.id.slice(-8)} від ${c.date}</p>`);
                lines.push(`</div>`);
                lines.push(`<p><strong>Клієнт:</strong> ${c.clientName || '—'}</p>`);
                lines.push(`<p><strong>Автомобіль:</strong> ${c.carBrand || ''} ${c.carModel || ''} (${c.carYear || '—'}) | ${c.plateNumber || '—'}</p>`);
                lines.push(`<hr>`);
                if (c.works && c.works.length > 0) {
                    lines.push(`<h4>🔧 Виконані роботи:</h4>`);
                    lines.push(`<table><thead><tr><th>Робота</th><th>К-сть</th><th>Ціна</th><th>Сума</th></tr></thead><tbody>`);
                    c.works.forEach(w => lines.push(`<tr><td>${w.name}</td><td>${w.quantity || 1}</td><td>${(w.price || 0).toFixed(2)}</td><td>${(w.total || 0).toFixed(2)}</td></tr>`));
                    lines.push(`</tbody></table>`);
                }
                if (c.parts && c.parts.length > 0) {
                    lines.push(`<h4>🔩 Запчастини:</h4>`);
                    lines.push(`<table><thead><tr><th>Деталь</th><th>К-сть</th><th>Ціна/од</th><th>Сума</th></tr></thead><tbody>`);
                    c.parts.forEach(p => lines.push(`<tr><td>${p.name}</td><td>${p.quantity || 1}</td><td>${(p.salePrice || 0).toFixed(2)}</td><td>${(p.total || 0).toFixed(2)}</td></tr>`));
                    lines.push(`</tbody></table>`);
                }
                if (c.extraCost > 0) lines.push(`<p><strong>Додаткові витрати:</strong> ${c.extraCost.toFixed(2)} грн</p>`);
                if (c.discount > 0) lines.push(`<p><strong>Знижка:</strong> ${c.discount}% (${(c.discountAmount || 0).toFixed(2)} грн)</p>`);
                lines.push(`<hr>`);
                lines.push(`<p class="print-total" style="font-size:18px;"><strong>💰 Загальна сума: ${(c.totalSum || 0).toFixed(2)} грн</strong></p>`);
                if (c.prepayment > 0) lines.push(`<p><strong>💵 Передоплата:</strong> ${c.prepayment.toFixed(2)} грн</p>`);
                lines.push(`<p><strong>💳 Статус оплати:</strong> ${c.paymentStatus === 'paid' ? '✅ Оплачено' : c.paymentStatus === 'partial' ? '⚠️ Частково' : '❌ Борг'} | До оплати: ${(c.toPay || 0).toFixed(2)} грн</p>`);
                lines.push(`<p style="text-align:center;margin-top:20px;font-size:12px;color:#888;">Дякуємо за довіру! 🚗</p>`);
                return lines.join('\n');
            }

            function getCheckReceiptText(c) {
                const lines = [];
                lines.push(`🔧 Сервіс Аверс — Чек №${c.id.slice(-8)}`);
                lines.push(`📅 ${c.date} | 👤 ${c.clientName || '—'}`);
                lines.push(`🚗 ${c.carBrand || ''} ${c.carModel || ''} (${c.carYear || '—'}) ${c.plateNumber || ''}`);
                lines.push(`──────────────────────────`);
                if (c.works && c.works.length > 0) {
                    lines.push(`🔧 Роботи:`);
                    c.works.forEach(w => lines.push(`  • ${w.name} ×${w.quantity || 1} — ${(w.price || 0).toFixed(2)} = ${(w.total || 0).toFixed(2)} грн`));
                }
                if (c.parts && c.parts.length > 0) {
                    lines.push(`🔩 Запчастини:`);
                    c.parts.forEach(p => lines.push(`  • ${p.name} ×${p.quantity || 1} — ${(p.salePrice || 0).toFixed(2)}/од = ${(p.total || 0).toFixed(2)} грн`));
                }
                if (c.extraCost > 0) lines.push(`➕ Додаткові: ${c.extraCost.toFixed(2)} грн`);
                if (c.discount > 0) lines.push(`🏷 Знижка: ${c.discount}% (-${(c.discountAmount || 0).toFixed(2)} грн)`);
                lines.push(`──────────────────────────`);
                lines.push(`💰 ЗАГАЛЬНА СУМА: ${(c.totalSum || 0).toFixed(2)} грн`);
                lines.push(`💳 Статус: ${c.paymentStatus === 'paid' ? 'Оплачено' : c.paymentStatus === 'partial' ? 'Частково' : 'Борг'} | До оплати: ${(c.toPay || 0).toFixed(2)} грн`);
                lines.push(`🚗 Дякуємо! Сервіс Аверс`);
                return lines.join('\n');
            }

            function printCheck() {
                const id = finEditId;
                if (!id) { showToast('❌ Спочатку збережіть чек'); return; }
                const c = checks.find(x => x.id === id);
                if (!c) { showToast('❌ Чек не знайдено'); return; }
                const printArea = $('#printArea');
                printArea.innerHTML = getCheckReceiptHTML(c);
                printArea.style.display = 'block';
                window.print();
                setTimeout(() => { printArea.style.display = 'none'; }, 500);
            }

            function copyCheck() {
                const id = finEditId;
                if (!id) { showToast('❌ Спочатку збережіть чек'); return; }
                const c = checks.find(x => x.id === id);
                if (!c) { showToast('❌ Чек не знайдено'); return; }
                const text = getCheckReceiptText(c);
                navigator.clipboard.writeText(text).then(() => showToast('📋 Чек скопійовано! Можна вставити у Viber/Telegram/WhatsApp'))
                    .catch(() => showToast('❌ Помилка копіювання'));
            }

            function downloadPdf() {
                const id = finEditId;
                if (!id) { showToast('❌ Спочатку збережіть чек'); return; }
                const c = checks.find(x => x.id === id);
                if (!c) { showToast('❌ Чек не знайдено'); return; }
                const printArea = $('#printArea');
                printArea.innerHTML = getCheckReceiptHTML(c);
                printArea.style.display = 'block';
                window.print();
                setTimeout(() => { printArea.style.display = 'none'; }, 500);
                showToast('📥 У діалозі друку оберить "Зберегти як PDF"');
            }

            // ========== КЛІЄНТИ ==========
            function renderClientsTab() {
                const container = $('#clientsListContainer');
                const profiles = Object.values(clientsDB).sort((a, b) => (b.visitCount || 0) - (a.visitCount || 0));
                container.innerHTML = profiles.length ? profiles.map(p => `
                    <div class="list-item" onclick="window._showClientDetail('${getClientProfileKey(p.name)}')">
                        <div><strong>${p.name}</strong><br><small>${p.phones?.[0] || ''}</small></div>
                        <div style="text-align:right;"><span>Візитів: ${p.visitCount || 0}</span><br><span>Витрат: ${(p.totalSpent || 0).toFixed(0)} грн</span></div>
                    </div>
                `).join('') : '<div style="color:var(--text-muted);padding:12px;">Немає клієнтів</div>';
                $('#clientDetailPanel').innerHTML = '<div style="color:var(--text-muted);padding:12px;">Оберіть клієнта для перегляду</div>';
            }

            window._showClientDetail = (key) => {
                const p = clientsDB[key];
                if (!p) return;
                const clientChecks = checks.filter(c => getClientProfileKey(c.clientName || '') === key);
                const clientAppts = appointments.filter(a => getClientProfileKey(a.clientName || '') === key);
                $('#clientDetailPanel').innerHTML = `
                    <h3>${p.name}</h3>
                    <p>📞 ${(p.phones || []).join(', ') || '—'}</p>
                    <p>🚗 ${(p.cars || []).map(c => `${c.brand} ${c.model} (${c.year || '—'})`).join('; ') || '—'}</p>
                    <p>🔄 Візитів: ${p.visitCount || 0} | 💰 Витрат: ${(p.totalSpent || 0).toFixed(2)} грн</p>
                    <h4 style="margin-top:8px;">Останні чеки:</h4>
                    ${clientChecks.slice(0,5).map(c => `<div style="font-size:0.7rem;padding:3px 0;">${c.date} — ${c.totalSum.toFixed(2)} грн (${c.paymentStatus})</div>`).join('') || '—'}
                    <h4 style="margin-top:8px;">Останні записи:</h4>
                    ${clientAppts.slice(0,5).map(a => `<div style="font-size:0.7rem;padding:3px 0;">${a.date} ${a.time?.slice(0,5)} — ${(a.services || []).join(', ')}</div>`).join('') || '—'}
                `;
            };

            // ========== НАВІГАЦІЯ ==========
            function switchTab(tab) {
                $$('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelector(`.tab-btn[data-tab="${tab}"]`)?.classList.add('active');
                $$('.tab-content').forEach(c => c.classList.remove('active'));
                const tabEl = document.getElementById('tab' + tab.charAt(0).toUpperCase() + tab.slice(1));
                if (tabEl) tabEl.classList.add('active');
                if (tab === 'calendar') renderCalendar();
                if (tab === 'finance') renderFinanceTab();
                if (tab === 'clients') renderClientsTab();
            }

            // ========== ІНІЦІАЛІЗАЦІЯ (АСИНХРОННА) ==========
            async function init() {
                await loadData();
                loadTheme();
                $('#inputDate').value = formatDate(selectedDate);
                $('#finDate').value = formatDate(new Date());
                renderCalendar();
                populateFinAppointmentsSelect();
                renderWorksTags();
                updateFinWorksList();
                updateFinPartsList();
                updateFinSummary();
                renderTodayClients();

                // Налаштування автодоповнень
                setupAutocomplete($('#inputClientName'), $('#dropdownClientName'), clientNames, {
                    onSelect: (item) => {
                        $('#inputClientName').value = item.name;
                        const key = getClientProfileKey(item.name);
                        if (clientsDB[key]) {
                            const c = clientsDB[key];
                            if (c.phones && c.phones.length > 0) $('#inputPhone').value = c.phones[0];
                            if (c.cars && c.cars.length > 0) {
                                const car = c.cars[0];
                                $('#inputCarBrand').value = car.brand || '';
                                $('#inputCarModel').value = car.model || '';
                                $('#inputCarYear').value = car.year || '';
                            }
                        }
                    },
                    allowAddNew: true,
                    addNewLabel: '➕ Створити клієнта: ',
                    minChars: 1,
                    clearAfterSelect: false
                });

                setupAutocomplete($('#inputCarBrand'), $('#dropdownCarBrand'), Object.keys(carCatalog).sort(), {
                    onSelect: (item) => {
                        $('#inputCarBrand').value = item.name;
                        $('#inputCarModel').value = '';
                        $('#inputCarModel').focus();
                    },
                    allowAddNew: true,
                    addNewLabel: '➕ Додати марку: ',
                    minChars: 1,
                    clearAfterSelect: false
                });

                $('#inputCarModel').addEventListener('focus', function() {
                    const brand = $('#inputCarBrand').value.trim();
                    const models = brand && carCatalog[brand] ? carCatalog[brand] : [];
                    setupAutocomplete($('#inputCarModel'), $('#dropdownCarModel'), models, {
                        onSelect: (item) => { $('#inputCarModel').value = item.name; },
                        allowAddNew: true,
                        addNewLabel: '➕ Додати модель: ',
                        minChars: 1,
                        clearAfterSelect: false
                    });
                    if (models.length > 0 && !this.value) {
                        const ev = new Event('input');
                        this.dispatchEvent(ev);
                    }
                });

                setupAutocomplete($('#inputWorkSearch'), $('#dropdownWorkSearch'), workCatalog, {
                    onSelect: (item) => {
                        if (item.isNew && !workCatalog.includes(item.name)) {
                            workCatalog.push(item.name);
                            workCatalog.sort((a, b) => a.localeCompare(b, 'uk'));
                            saveAll();
                        }
                        addWorkToSelection(item.name);
                    },
                    allowAddNew: true,
                    addNewLabel: '➕ Додати роботу: ',
                    minChars: 1,
                    clearAfterSelect: true
                });

                setupAutocomplete($('#finWorkSearch'), $('#dropdownFinWorkSearch'), workCatalog, {
                    onSelect: (item) => {
                        if (item.isNew && !workCatalog.includes(item.name)) {
                            workCatalog.push(item.name);
                            workCatalog.sort((a, b) => a.localeCompare(b, 'uk'));
                            saveAll();
                        }
                        finWorks.push({ customName: item.name, name: item.name, price: 0, quantity: 1 });
                        updateFinWorksList();
                        updateFinSummary();
                    },
                    allowAddNew: true,
                    addNewLabel: '➕ Додати роботу: ',
                    minChars: 1,
                    clearAfterSelect: true
                });

                setupAutocomplete($('#finPartSearch'), $('#dropdownFinPartSearch'), partsCatalog, {
                    onSelect: (item) => {
                        if (item.isNew && !partsCatalog.includes(item.name)) {
                            partsCatalog.push(item.name);
                            partsCatalog.sort((a, b) => a.localeCompare(b, 'uk'));
                            saveAll();
                        }
                        finParts.push({ name: item.name, salePrice: 0, purchasePrice: 0, quantity: 1 });
                        updateFinPartsList();
                        updateFinSummary();
                    },
                    allowAddNew: true,
                    addNewLabel: '➕ Додати запчастину: ',
                    minChars: 1,
                    clearAfterSelect: true
                });

                setupAutocomplete($('#clientSearchInput'), $('#dropdownClientSearch'), clientNames, {
                    onSelect: (item) => {
                        $('#clientSearchInput').value = item.name;
                        window._showClientDetail(getClientProfileKey(item.name));
                    },
                    minChars: 1,
                    clearAfterSelect: false
                });

                // Обробники подій
                $('#themeToggle').addEventListener('click', toggleTheme);
                $('#logoSection').addEventListener('click', () => {
                    currentDate = new Date();
                    selectedDate = new Date();
                    renderCalendar();
                });
                $('#btnNewAppointment').addEventListener('click', () => {
                    resetCalendarForm();
                    switchTab('calendar');
                    $('#sidePanelCalendar').scrollIntoView({ behavior: 'smooth' });
                });
                $('#btnNewCheck').addEventListener('click', () => {
                    resetFinanceForm();
                    switchTab('finance');
                    $('#sidePanelFinance').scrollIntoView({ behavior: 'smooth' });
                });
                $('#btnSave').addEventListener('click', saveAppointment);
                $('#btnCancel').addEventListener('click', resetCalendarForm);
                $('#btnDelete').addEventListener('click', () => { if (editingId) deleteAppointment(editingId); });
                $('#btnPrev').addEventListener('click', () => {
                    currentDate.setMonth(currentDate.getMonth() - 1);
                    renderCalendar();
                });
                $('#btnNext').addEventListener('click', () => {
                    currentDate.setMonth(currentDate.getMonth() + 1);
                    renderCalendar();
                });
                $('#btnToday').addEventListener('click', () => {
                    currentDate = new Date();
                    selectedDate = new Date();
                    renderCalendar();
                });
                $('#finSelectAppointment').addEventListener('change', function() {
                    autoFillFinanceFromAppointment(this.value);
                });
                $('#btnSaveCheck').addEventListener('click', saveCheck);
                $('#btnCancelCheck').addEventListener('click', resetFinanceForm);
                $('#finDiscount').addEventListener('input', updateFinSummary);
                $('#finExtraCost').addEventListener('input', updateFinSummary);
                $('#finPrepayment').addEventListener('input', updateFinSummary);
                $('#finPaymentStatus').addEventListener('change', updateFinSummary);
                $('#btnPrintCheck').addEventListener('click', printCheck);
                $('#btnCopyCheck').addEventListener('click', copyCheck);
                $('#btnPdfCheck').addEventListener('click', downloadPdf);
                $('#btnRefreshClients').addEventListener('click', renderClientsTab);

                $('#todayClientsToggle').addEventListener('click', toggleTodayClients);

                $$('.tab-btn').forEach(b => b.addEventListener('click', () => switchTab(b.dataset.tab)));

                document.addEventListener('click', (e) => {
                    if (!e.target.closest('.autocomplete-wrapper')) {
                        $$('.autocomplete-dropdown').forEach(d => { d.classList.remove('show'); d.innerHTML = ''; });
                    }
                });

                setInterval(() => {
                    const todayStr = formatDate(new Date());
                    const todayCells = $$('.month-cell.today');
                    if (todayCells.length === 0 || !isSameDay(currentDate, new Date())) {
                        if (isSameDay(selectedDate, new Date())) selectedDate = new Date();
                        currentDate = new Date();
                        renderCalendar();
                    }
                    renderTodayClients();
                }, 60000);
            }

            document.addEventListener('DOMContentLoaded', () => {
                init().catch(e => console.error('Помилка ініціалізації:', e));
            });

        })();
    </script>
</body>
</html>
